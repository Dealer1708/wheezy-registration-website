@extends("base.html")
@require(path_for)


@def header_content():
        <a href='/logout' class="btn btn-warning">Logout</a>
@end

@def content():
    <title>Error List</title>
    <div class="d-flex mb-3 mt-3">
            <h1 class="mx-3 text-start h3 mb-3 fw-normal me-lg-auto mb-2 justify-content-center mb-md-0">Validation Errors:</h1>
            <div id="filter-nav" class="rounded bg-secondary text-white" style="display: none;">
                <p class="filter-text">Filter by</p>
                <label class="filter-labels" style="margin-left: 10px;" for="checkbox">
                    <input id="fixed" type="checkbox">
                    &#9989;
                </label>
                <br>
                <label class="filter-labels" style="margin-right: 10px;" for="checkbox">
                    <input id="non-fixed" type="checkbox">
                    &#10060;
                </label>
                <br>
                <p class="filter-items-onpage">Items on page</p>
                <select id="items-on-page" class="bg-secondary text-white rounded form-select-sm">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                </select>
            </div>
            <button id="filters" class="mx-3 btn btn-primary">&#9776; Filter</button>
    </div>
    <table class="table table-bordered table-striped"><tbody id="list-container"></tbody></table>
    <nav class="pagination-container" style="display: flex; justify-content: center;">
        <button class="btn btn-primary" id="prev-button" title="Previous page" aria-label="Previous page">&lt;</button>
        <div class="btn-toolbar" role="toolbar" id="pagination-numbers"></div>
        
        <button class="btn btn-primary" id="next-button" title="Next page" aria-label="Next page">&gt;</button>
    </nav>
    <script src="@path_for('static',path='error_list.js')"></script>
@end
